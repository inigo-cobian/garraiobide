name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Build
        run: bazel build //...

      - name: Test with Coverage
        run: |
          bazel coverage \
            --combined_report=lcov \
            --instrumentation_filter="//src[/:]" \
            //tests:all

      - name: Prepare Coverage Report
        run: |
          mkdir -p bazel-testlogs/tests
          cp "$(bazel info output_path)/_coverage/_coverage_report.dat" bazel-testlogs/tests/coverage.lcov

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: bazel-testlogs/tests/coverage.lcov
          fail_ci_if_error: false
