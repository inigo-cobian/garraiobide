name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    # TODO setup the options

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Conan and gcovr
        run: |
          pip install conan gcovr

      - name: Create Conan profile
        run: |
          mkdir -p .conan/profiles
          cat > .conan/profiles/linux_gcc14_debug <<EOF
          [settings]
          arch=x86_64
          build_type=Debug
          compiler=gcc
          compiler.version=14
          compiler.libcxx=libstdc++11
          compiler.cppstd=gnu23
          os=Linux
          [conf]
          tools.build:cxxflags=["-std=gnu++23"]
          tools.build:compiler_executables={"cxx": "g++-14", "cc": "gcc-14"}
          EOF

      - name: Install dependencies with Conan
        run: |
          mkdir -p build
          cd build
          conan install .. --build=missing \
            -pr:h=../.conan/profiles/linux_gcc14_debug \
            -pr:b=../.conan/profiles/linux_gcc14_debug
          export CC=gcc-14
          export CXX=g++-14

      - name: Configure CMake with coverage flags
        run: |
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=generators/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_FLAGS="-fprofile-arcs -ftest-coverage -std=gnu++23" \
            -DCMAKE_EXE_LINKER_FLAGS="-fprofile-arcs -ftest-coverage"

      - name: Build the project
        run: |
          cd build
          cmake --build . -- -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -C Debug

      - name: Generate coverage report
        run: |
          cd build
          # Use gcov-12 to match the compiler
          gcovr --root .. --gcov-executable "gcov-14" --xml coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: build/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}