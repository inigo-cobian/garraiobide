name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov

      - name: Install Conan
        run: pip install conan

      - name: Create Conan profile
        run: conan profile detect

      - name: Install dependencies (Conan)
        run: conan install . --build=missing -s build_type=Debug -of build

      - name: Configure CMake
        run: |
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake

      - name: Build
        run: |
          cd build
          cmake --build . --parallel

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Generate coverage report (LCOV)
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --remove coverage.info '*/tests/*' --output-file coverage.info
          lcov --remove coverage.info '*/adapters/mock*' --output-file coverage.info   # exclude mocks
          lcov --list coverage.info   # show summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false