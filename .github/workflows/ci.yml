name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++ lcov ninja-build

      - name: Install Conan
        run: pip install conan

      - name: Create Conan profile
        run: conan profile detect

      - name: Install dependencies (Conan)
        run: conan install . --build=missing -s build_type=Debug

      - name: Configure CMake
        run: |
          cmake --preset conan-debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build --preset conan-debug --parallel

      - name: Run tests
        run: ctest --preset conan-debug --output-on-failure

      - name: Generate coverage report (LCOV)
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '/usr/*' --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '*/tests/*' --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '*/adapters/mock*' --output-file coverage.info --ignore-errors mismatch,unused
          lcov --list coverage.info --ignore-errors mismatch,unused

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false
