name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Build
        run: bazel build //...

      - name: Test with Coverage
        run: bazel coverage //tests:layer_service_test //tests:domain_test

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: bazel-testlogs/tests/layer_service_test/coverage.dat,bazel-testlogs/tests/domain_test/coverage.dat
          fail_ci_if_error: false
